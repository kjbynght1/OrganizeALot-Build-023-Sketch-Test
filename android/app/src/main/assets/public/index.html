<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1120" />
  <title>OrganizeALot v2.1.0 Build 023</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div>
    <h1>OrganizeALot</h1>
    <p>v2.1.0 Build 023</p>
  </div>
  <button id="installBtn" class="small hidden">Install</button>
</header>

<main>
  <section id="menuScreen" class="screen active">
    <h2>Start Inspection</h2>
    <div class="grid type-grid">
      <button class="tile" data-type="Residential">🏠<span>Residential</span><small>Full residential workflow</small></button>
      <button class="tile" data-type="OBS">🚗<span>OBS</span><small>Exterior only</small></button>
      <button class="tile" data-type="USAA">🛡️<span>USAA</span><small>Interior & exterior</small></button>
      <button class="tile preferred" data-type="Preferred Reports">📋<span>Preferred Reports</span><small>Commercial field workflow</small></button>
    </div>

    <h3>Resume Inspections</h3>
    <div id="savedList" class="saved-list"></div>

    <details id="archiveDetails" class="archive-box hidden">
      <summary>Archived Inspections</summary>
      <div id="archivedList" class="saved-list"></div>
    </details>
  </section>

  <section id="setupScreen" class="screen">
    <button class="back" data-screen="menuScreen">← Back</button>
    <h2 id="setupTitle">New Inspection</h2>
    <div class="card">
      <label>Inspection ID
        <input id="inspectionId" placeholder="Required to save" autocomplete="off" />
      </label>
      <label>Address
        <input id="address" placeholder="Required to save and use Waze" autocomplete="street-address" />
      </label>
      <label>Inspector
        <input id="inspector" placeholder="Chris Roberts" autocomplete="name" />
      </label>
      <div class="two-buttons">
        <button id="wazeSetupBtn" class="waze">Open Waze</button>
        <button id="startBtn" class="primary">Start Inspection</button>
      </div>
      <p class="muted">The inspection is saved only after both Inspection ID and Address are entered.</p>
    </div>
  </section>

  <section id="inspectionScreen" class="screen">
    <div class="sticky-tools">
      <button class="back" data-screen="menuScreen">← Inspections</button>
      <button id="saveBtn" class="secondary">Save</button>
    </div>

    <div class="card inspection-header-card">
      <h2 id="inspectionTitle">Inspection</h2>
      <div id="inspectionMeta" class="muted"></div>
      <div id="galleryStatus" class="muted">📱 Gallery backup ready</div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="progressText">0/0 complete</span><span id="readyText">In progress</span></div>
        <div class="progress"><div id="progressBar"></div></div>
      </div>
      <div class="two-buttons">
        <button id="wazeBtn" class="waze">🚗 Waze to This Inspection</button>
        <button id="exportBtn" class="primary">Finish & Export ZIP</button>
      </div>
    </div>

    <div id="coreFields" class="card"></div>
    <div id="sections"></div>
  </section>

  <section id="departureScreen" class="screen">
    <button class="back" data-screen="inspectionScreen">← Inspection</button>
    <h2>Final Departure Check</h2>
    <div id="departureResults"></div>
  </section>
</main>

<div id="photoModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-card">
    <h2 id="photoModalTitle">Review Photo</h2>
    <img id="photoPreview" alt="Photo preview" />
    <div class="modal-actions">
      <button id="usePhotoBtn" class="primary">Use Photo</button>
      <button id="retakePhotoBtn" class="secondary">Retake</button>
      <button id="cancelPhotoBtn" class="ghost">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="capacitor.js"></script>
<script src="app.js"></script>
</body>
</html>
